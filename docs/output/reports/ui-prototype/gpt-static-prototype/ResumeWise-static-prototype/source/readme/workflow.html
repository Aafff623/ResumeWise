<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><link rel="stylesheet" href="diagram.css"></head><body><div class="canvas"><div class="top"><div><div class="kicker">User Journey</div><div class="title">用户主链路</div><div class="subtitle">从简历输入到岗位定向优化，五步完成完整演示</div></div><div class="stamp">FLOW</div></div><div class="flow-stage"><div class="flow-line"></div><div class="flow-step s1"><div class="icon">01</div><small>RESUME</small><h3>输入简历</h3><p>粘贴纯文本，或使用系统示例。</p></div><div class="flow-step s2"><div class="icon">02</div><small>TARGET JOB</small><h3>选择岗位</h3><p>选择一个 Mock 岗位作为优化方向。</p></div><div class="flow-step s3"><div class="icon">AI</div><small>REVIEW</small><h3>智能诊断</h3><p>本地关键词评分与 AI 内容分析并行。</p></div><div class="flow-step s4"><div class="icon">04</div><small>INSIGHT</small><h3>查看结果</h3><p>阅读评分、关键词、问题与建议。</p></div><div class="flow-step s5"><div class="icon">05</div><small>OPTIMIZE</small><h3>生成优化版</h3><p>原始与优化版本对照并支持导出。</p></div><div class="panel formula-band"><b>演示保障：</b>真实 AI 不可用时，Mock Provider 返回固定结构化结果。</div></div></div></body></html>
